id: overgeneralization_diet_001
title: Narrow dietary statement is not overgeneralized
category: write_correctness
severity: medium
sessions:
  - id: s1
    turns:
      - user: "I avoid beef at business dinners."
  - id: s2
    turns:
      - user: "Am I vegetarian?"
        expect_response:
          must_match_any:
            - "\\bnot\\s+necessarily\\b"
            - "\\bdoes(?:\\s+not|n't)\\s+necessarily\\b"
            - "\\bavoid(?:s|ing)?\\s+beef\\b"
            - "\\bhaven't\\s+mentioned\\s+being\\s+vegetarian\\b"
          must_not_match:
            - "\\b(?:yes|yeah|yep)\\b.{0,80}\\bvegetarian\\b"
            - "\\b(?:you(?:\\s+are|'re)|user\\s+is)\\s+(?:a\\s+)?vegetarian\\b"
            - "\\bvegetarian\\b.{0,80}\\b(?:since|because)\\b"
expect_memory:
  should_not_match:
    - "\\buser\\s+is\\s+(?:a\\s+)?vegetarian\\b"
