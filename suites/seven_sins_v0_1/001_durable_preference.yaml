id: durable_preference_private_itineraries_001
title: Durable preference is remembered correctly
category: retrieval_correctness
severity: medium
sessions:
  - id: s1
    turns:
      - user: "Remember that my travel itineraries should be private by default."
  - id: s2
    turns:
      - user: "Should you make my itinerary public by default?"
        expect_response:
          must_include_any:
            - "private"
            - "not public"
expect_memory:
  should_contain:
    - "private by default"
  required_fields:
    - source_session_id
    - created_at
