services:
  neo4j:
    image: neo4j:5.26-community
    container_name: memorystackbench-graphiti-neo4j
    environment:
      NEO4J_AUTH: neo4j/memorystackbench
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - graphiti_neo4j_data:/data
      - graphiti_neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18

volumes:
  graphiti_neo4j_data:
  graphiti_neo4j_logs:
