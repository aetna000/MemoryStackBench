id: openai_agents_sdk_sessions_pinned
framework: openai_agents_sdk_sessions
mode: black_box
status: implemented
description: OpenAI Agents SDK Sessions target for persistent conversation history across agent runs.
source_url: https://openai.github.io/openai-agents-python/sessions/
source:
  type: python_package
  package: openai-agents
  version: 0.17.8
runtime:
  type: local_python
  required_env:
    - OPENAI_API_KEY
model:
  provider: openai
  model: gpt-4o-mini
  temperature: 0
adapter:
  module: memorybench.adapters.openai_agents_sessions
  class: OpenAIAgentsSessionsAdapter
capabilities:
  inspect_memory: true
  delete_memory: session_clear_only
  retrieval_log: false
  multi_user: true
  multi_tenant: false
notes:
  - Sessions are conversation-history memory, not necessarily long-term semantic memory.
  - Deletion uses SQLiteSession.clear_session because selective semantic deletion is not provided by Sessions.
