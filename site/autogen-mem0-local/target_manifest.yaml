id: autogen_mem0memory_pinned
framework: autogen_mem0memory
mode: white_box
status: implemented
description: Microsoft AutoGen AgentChat target using autogen_ext.memory.mem0.Mem0Memory.
source_url: https://microsoft.github.io/autogen/stable/user-guide/agentchat-user-guide/memory.html
source:
  type: python_package
  packages:
    - autogen-agentchat
    - autogen-ext[mem0]
    - mem0ai
  version: autogen-agentchat==0.7.5, autogen-ext==0.7.5, mem0ai==2.0.11
runtime:
  type: local_python
model:
  provider: openai_compatible
  model: gpt-4o-mini
  temperature: 0
mem0_config:
  vector_store:
    provider: qdrant
    config:
      collection_name: memorystackbench_autogen_mem0
      path: /tmp/memorystackbench/autogen_qdrant
      on_disk: true
  llm:
    provider: openai
    config:
      model: gpt-4o-mini
      temperature: 0
  embedder:
    provider: openai
    config:
      model: text-embedding-3-small
adapter:
  module: memorybench.adapters.autogen_mem0memory
  class: AutoGenMem0MemoryAdapter
capabilities:
  inspect_memory: true
  delete_memory: true
  retrieval_log: partial
  multi_user: true
  multi_tenant: false
