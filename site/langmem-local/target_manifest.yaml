id: langmem_pinned
framework: langmem
mode: white_box
status: implemented_store_harness
description: LangMem manage/search tools backed by LangGraph InMemoryStore.
source_url: https://langchain-ai.github.io/langmem/
source:
  type: python_package
  package: langmem
  version: 0.0.30
runtime:
  type: local_python
model:
  provider: none
  model: deterministic_store_adapter
  temperature: 0
adapter:
  module: memorybench.adapters.langmem
  class: LangMemAdapter
capabilities:
  inspect_memory: true
  delete_memory: true
  retrieval_log: true
  multi_user: true
  multi_tenant: false
notes:
  - Uses LangMem create_manage_memory_tool and create_search_memory_tool over LangGraph InMemoryStore.
  - Adapter supplies explicit trusted-write, update, retrieval, and delete policy for benchmark comparability.
