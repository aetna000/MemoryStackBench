id: agno_memory_pinned
framework: agno_memory
mode: white_box
status: implemented_store_harness
description: Agno MemoryManager target using the in-memory DB backend.
source_url: https://docs.agno.com/memory/overview
source:
  type: python_package
  package: agno
  version: 2.6.22
runtime:
  type: local_python
model:
  provider: none
  model: deterministic_store_adapter
  temperature: 0
adapter:
  module: memorybench.adapters.agno_memory
  class: AgnoMemoryAdapter
capabilities:
  inspect_memory: true
  delete_memory: true
  retrieval_log: true
  multi_user: true
  multi_tenant: false
notes:
  - Uses Agno MemoryManager and InMemoryDb as the real memory primitive.
  - Adapter supplies explicit trusted-write, update, retrieval, and delete policy for benchmark comparability.
