id: cognee_local_pinned
framework: cognee
mode: white_box
status: implemented_store_harness
description: Cognee open-source memory target using remember, graph-backed recall, and forget.
source_url: https://docs.cognee.ai/
source:
  type: python_package
  package: cognee
  version: 1.2.2
runtime:
  type: local_python
  required_env:
    - OPENAI_API_KEY
model:
  provider: openai
  model: gpt-4o-mini
  temperature: 0
adapter:
  module: memorybench.adapters.cognee
  class: CogneeAdapter
capabilities:
  inspect_memory: true
  delete_memory: data_item_forget
  retrieval_log: true
  multi_user: true
  multi_tenant: false
notes:
  - The adapter creates one temporary Cognee dataset per benchmark subject, writes trusted facts with DataItem + remember(), retrieves with recall(..., only_context=True), and cleans up datasets with forget().
  - On this macOS/Python 3.12 host, cbor2==5.8.0 is pinned as a binary-wheel workaround for cognee==1.2.2 installation.
